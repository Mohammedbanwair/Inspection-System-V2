services:
  mongo:
    image: mongo:7
    container_name: inspection_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: inspection_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "${DB_NAME:-inspection_db}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      JWT_SECRET: "${JWT_SECRET:-please-change-me-to-a-64-char-random-hex}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@inspection.app}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
    ports:
      - "${BACKEND_PORT:-8001}:8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: "${REACT_APP_BACKEND_URL:-http://localhost:8001}"
    container_name: inspection_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mongo_data:
